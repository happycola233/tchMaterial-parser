<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国家中小学智慧教育平台 资源下载工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .content { padding: 30px; }
        .section { margin-bottom: 25px; }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: "";
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .token-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .token-input { display: flex; gap: 10px; }
        .token-input input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 14px;
        }
        .token-input input:focus { outline: none; border-color: #667eea; }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary { background: #f5f5f5; color: #666; }
        .btn-secondary:hover { background: #e8e8e8; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .result.success { display: block; background: #e8f5e9; border: 1px solid #4caf50; }
        .result.error { display: block; background: #ffebee; border: 1px solid #f44336; }
        .result h3 { font-size: 15px; margin-bottom: 10px; color: #333; }
        .result p { font-size: 14px; color: #666; margin-bottom: 8px; word-break: break-all; }
        .result a { color: #667eea; text-decoration: none; font-weight: 500; }
        .help-text { font-size: 12px; color: #888; margin-top: 10px; line-height: 1.6; }
        .help-text code { background: #e8e8e8; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .help-text a { color: #667eea; text-decoration: none; }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e8e8e8;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .checkbox-wrapper { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-wrapper input { width: 18px; height: 18px; accent-color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 国家中小学智慧教育平台 资源下载工具</h1>
            <p>Flask Web版本</p>
        </div>

        <div class="content">
            <div class="token-section">
                <div class="section-title">Access Token 设置</div>
                <div class="token-input">
                    <input type="text" id="tokenInput" placeholder="请输入 Access Token（可选）">
                    <button class="btn btn-secondary" id="setTokenBtn">设置</button>
                </div>
                <div class="help-text">
                    <strong>获取方法：</strong>登录 <a href="https://auth.smartedu.cn/uias/login" target="_blank">国家中小学智慧教育平台</a> 后，
                    按F12控制台执行：<code>JSON.parse(localStorage.getItem(Object.keys(localStorage).find(k=>k.startsWith("ND_UC_AUTH")))).access_token</code>
                </div>
            </div>

            <div class="section">
                <div class="section-title">资源链接</div>
                <textarea id="urlInput" placeholder="请输入资源页面网址，每行一个"></textarea>
            </div>

            <div class="section">
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="bookmarkCheck" checked>
                    <span>添加书签</span>
                </label>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="parseBtn">🔍 解析</button>
                <button class="btn btn-primary" id="downloadBtn">📥 下载</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>处理中，请稍候...</p>
            </div>

            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        function $(id) { return document.getElementById(id); }

        function showLoading(show) {
            $('loading').style.display = show ? 'block' : 'none';
            $('parseBtn').disabled = show;
            $('downloadBtn').disabled = show;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showResult(type, message, extra) {
            const result = $('result');
            result.className = 'result ' + type;
            result.innerHTML = '<h3>' + escapeHtml(message) + '</h3>' + extra;
            result.style.display = 'block';
        }

        function hideResult() { $('result').style.display = 'none'; }

        $('setTokenBtn').addEventListener('click', function() {
            fetch('/api/set_token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: $('tokenInput').value.trim() })
            })
            .then(r => r.json())
            .then(data => { if (data.success) alert('Token 设置成功！'); });
        });

        function parseUrl() {
            const url = $('urlInput').value.trim();
            const bookmarks = $('bookmarkCheck').checked;
            if (!url) { showResult('error', '请输入资源链接', ''); return; }
            hideResult();
            showLoading(true);

            fetch('/api/parse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, bookmarks })
            })
            .then(r => r.json())
            .then(data => {
                showLoading(false);
                if (data.error) { showResult('error', data.error, ''); return; }
                let extra = '<p><strong>标题：</strong>' + escapeHtml(data.title || '未知') + '</p>';
                extra += '<p><strong>下载链接：</strong><a href="' + escapeHtml(data.resource_url) + '" target="_blank">' + escapeHtml(data.resource_url) + '</a></p>';
                showResult('success', '解析成功！', extra);
            })
            .catch(err => { showLoading(false); showResult('error', err.message, ''); });
        }

        function downloadFile() {
            const url = $('urlInput').value.trim();
            const bookmarks = $('bookmarkCheck').checked;
            if (!url) { showResult('error', '请输入资源链接', ''); return; }
            showLoading(true);

            fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, bookmarks })
            })
            .then(r => { if (!r.ok) throw new Error('下载失败'); return r.blob(); })
            .then(blob => {
                showLoading(false);
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'download.pdf';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                showResult('success', '下载完成！', '');
            })
            .catch(err => { showLoading(false); showResult('error', err.message, ''); });
        }

        $('parseBtn').addEventListener('click', parseUrl);
        $('downloadBtn').addEventListener('click', downloadFile);
    </script>
</body>
</html>
